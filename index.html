<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XS8FZ10XE3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-XS8FZ10XE3');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>austinwells.dev</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style></style>
</head>
<body>
  <nav class="topnav" style="opacity: 0;">
    <a href="/" class="home">austinwells.dev</a>
    
    <section class="sites">
      <ul>
        <li><a href="https://github.com/stnwlls" target="_blank"><i class="bi bi-github"></i></a></li>
        <li><a href="https://www.linkedin.com/in/austinhwells" target="_blank"><i class="bi bi-linkedin"></i></a></li>
        <li><a href="/resume"><i class="bi bi-file-person"></i></a></li>
      </ul>
    </section>  
  </nav>
  
  <nav class="navbar" style="opacity: 0;">
    <ul>
      <li class="active"><a href="/">home</a></li>
      <li><a href="/about">about</a></li>
      <li><a href="/portfolio">portfolio</a></li>
      <li><a href="/contact">contact</a></li>
    </ul>
  </nav>
  
  <section class="hero">
    <div class="hero-content">
      <div class="hello-world">
        <p></p>
      </div>
      <div class="name">
        <h1></h1>
      </div>
      <div class="role">
        <h1></h1>
      </div>
      <div class="intro" style="opacity: 0; transition: opacity 1s ease;">
        <p>I create modern, responsive websites and web applications with clean, efficient code.</p>
      </div>
      <div class="cta-buttons" style="text-align: center;">
        <a href="/portfolio" class="btn">View My Work</a>
        <a href="/resume" class="btn secondary">My Resume</a>
        <a href="/about" class="btn secondary">About Me</a>
        <a href="/contact" class="btn secondary">Get In Touch</a>
      </div>
    </div>
  </section>

  <script>
    let animationHasRun = false;

    function initPage() {
      if (animationHasRun) return;
      animationHasRun = true;

      const topNav = document.querySelector('.topnav');
      const bottomNav = document.querySelector('.navbar');
      const bottomNavItems = Array.from(document.querySelectorAll('.navbar li'));
      const ctaButtons = Array.from(document.querySelectorAll('.cta-buttons .btn'));

      // Keep nav bars hidden until hero typing finishes.
      [topNav, bottomNav].forEach((nav) => {
        if (!nav) return;
        nav.style.opacity = 0;
        nav.style.transition = 'opacity 1s ease';
      });

      // Prepare bottom nav items for staggered fly-in reveal.
      bottomNavItems.forEach((item) => {
        item.style.opacity = 0;
        item.style.transform = 'translateY(16px)';
        item.style.transition = 'opacity 1.1s cubic-bezier(0.22, 1, 0.36, 1), transform 1.1s cubic-bezier(0.22, 1, 0.36, 1)';
      });

      // Hide CTA buttons initially so they can reveal one by one.
      ctaButtons.forEach((button) => {
        button.style.opacity = 0;
        button.style.transform = 'translateY(8px)';
        button.style.transition = 'opacity 0.9s ease, transform 0.9s ease';
      });

      const greetingElements = [
      { element: document.querySelector('.hello-world p'), text: 'hello, world' },
      { element: document.querySelector('.name h1'), text: "i'm austin" },
      { element: document.querySelector('.role h1'), text: 'front-end web developer' }
      ];
      
      // Clear all text first to prevent duplication
      greetingElements.forEach(({ element }) => {
        if (element) element.textContent = '';
      });
      
      function typeText(elementObj, callback) {
        const { element, text } = elementObj;
        if (!element) return;
        let i = 0;
        
        function addChar() {
          if (i < text.length) {
            element.textContent += text[i];
            i++;
            setTimeout(addChar, 60);
          } else if (callback) {
            callback();
          }
        }
        
        addChar();
      }
      
      function sequentialTyping(i = 0) {
        if (i < greetingElements.length) {
          typeText(greetingElements[i], () => sequentialTyping(i + 1));
        } else {
          // All greeting elements typed - now show everything else in hero section
          showHeroContent();
        }
      }
      
      sequentialTyping();

      function showHeroContent() {
        // Show the intro text and CTA buttons after typing completes
        setTimeout(() => {
          const intro = document.querySelector('.intro');
          if (intro) intro.style.opacity = 1;

          if (topNav) topNav.style.opacity = 1;
          if (bottomNav) bottomNav.style.opacity = 1;

        }, 300);
        
        setTimeout(() => {
          ctaButtons.forEach((button, index) => {
            setTimeout(() => {
              button.style.opacity = 1;
              button.style.transform = 'translateY(0)';
            }, index * 220);
          });
        }, 1000);

        // Make bottom nav items fly in after all hero animations finish.
        const ctaSequenceDuration = 1000 + Math.max(0, ctaButtons.length - 1) * 220 + 900;
        setTimeout(() => {
          bottomNavItems.forEach((item, index) => {
            setTimeout(() => {
              item.style.opacity = 1;
              item.style.transform = 'translateY(0)';
            }, index * 180);
          });
        }, ctaSequenceDuration + 350);

        // Run a subtle nav wave starting 20s later, then repeat every 10s.
        const runNavWave = () => {
          bottomNavItems.forEach((item, index) => {
            setTimeout(() => {
              item.classList.remove('wave-bump');
              void item.offsetWidth;
              item.classList.add('wave-bump');
            }, index * 110);
          });
        };

        setTimeout(() => {
          runNavWave();
          setInterval(runNavWave, 10000);
        }, 20000);

      }
    }

    // Wait for DOM to be fully loaded - only run once
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPage, { once: true });
    } else {
      initPage();
    }
  </script>
</body>
</html>
